<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Add-in Eficiencia</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f7f9; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th { background: #254061; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .driver-row { background: #f9f9f9; font-style: italic; color: #555; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; background: #254061; color: white; }
        #loading { color: #e67e22; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Análisis de Rendimiento y Ralentí</h2>
    </div>

    <div class="controls">
        <label>Inicio: <input type="date" id="dateStart"></label>
        <label>Fin: <input type="date" id="dateEnd"></label>
        <button id="btnRun" class="btn">Generar Reporte</button>
        <div id="loading" style="display:none;">Consultando SDK de Geotab...</div>
    </div>

    <table id="reportTable">
        <thead>
            <tr>
                <th>Vehículo / Conductor</th>
                <th>Distancia (km)</th>
                <th>Combustible (Gal)</th>
                <th>Ralentí (Horas)</th>
                <th>Eficiencia (km/Gal)</th>
            </tr>
        </thead>
        <tbody id="reportContent">
            </tbody>
    </table>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script>
        geotab.addin.fleetEfficiency = () => {
            return {
                initialize(api, state, callback) {
                    document.getElementById("btnRun").addEventListener("click", () => {
                        this.processData(api);
                    });
                    callback();
                },

                async processData(api) {
                    const start = document.getElementById("dateStart").value;
                    const end = document.getElementById("dateEnd").value;
                    if (!start || !end) return alert("Selecciona fechas");

                    document.getElementById("loading").style.display = "block";

                    try {
                        // 1. Obtener Viajes (Trips)
                        const trips = await api.call("Get", {
                            typeName: "Trip",
                            search: { fromDate: start, toDate: end }
                        });

                        // 2. Obtener Dispositivos para nombres
                        const devices = await api.call("Get", { typeName: "Device" });

                        this.render(trips, devices);
                    } catch (err) {
                        alert("Error: " + err.message);
                    } finally {
                        document.getElementById("loading").style.display = "none";
                    }
                },

                render(trips, devices) {
                    const content = document.getElementById("reportContent");
                    content.innerHTML = "";

                    // Agrupar por vehículo
                    const data = trips.reduce((acc, trip) => {
                        const dId = trip.device.id;
                        if (!acc[dId]) acc[dId] = { name: "", dist: 0, idle: 0, fuel: 0 };
                        acc[dId].dist += trip.distance || 0;
                        acc[dId].idle += (trip.idlingDuration || 0); // Manejar duración
                        return acc;
                    }, {});

                    devices.forEach(d => {
                        if (data[d.id]) {
                            const v = data[d.id];
                            const idleHours = (new Date(v.idle).getTime() / 3600000).toFixed(2);
                            
                            let row = `<tr>
                                <td><strong>${d.name}</strong></td>
                                <td>${v.dist.toFixed(2)}</td>
                                <td>TBD*</td>
                                <td>${idleHours} h</td>
                                <td>--</td>
                            </tr>`;
                            content.innerHTML += row;
                        }
                    });
                }
            };
        };
    </script>
</body>
</html>
