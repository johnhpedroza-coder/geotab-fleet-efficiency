<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 20px;">
    <div style="max-width: 1200px; margin: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
        
        <div style="background: #254061; color: white; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 20px;">Rendimiento y Eficiencia de Flota (v10)</h2>
            <div id="loader" style="display:none; background: #e67e22; padding: 4px 15px; border-radius: 20px; font-size: 12px; font-weight: bold;">Buscando señales de combustible...</div>
        </div>

        <div style="padding: 15px 25px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; gap: 15px; align-items: center;">
            <label style="font-size: 13px; font-weight: bold;">Desde: <input type="date" id="dateStart" style="padding: 6px; border: 1px solid #ccc; border-radius: 4px;"></label>
            <label style="font-size: 13px; font-weight: bold;">Hasta: <input type="date" id="dateEnd" style="padding: 6px; border: 1px solid #ccc; border-radius: 4px;"></label>
            <button id="btnRun" style="background: #254061; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">ACTUALIZAR</button>
            <button id="btnExport" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">EXCEL</button>
        </div>

        <table style="width: 100%; border-collapse: collapse; background: white;">
            <thead>
                <tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                    <th style="padding: 15px; text-align: left; font-size: 13px;">VEHÍCULO / CONDUCTOR</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px;">DISTANCIA (KM)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px;">COMBUSTIBLE (GAL)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px;">RALENTÍ (HRS)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px;">EFICIENCIA</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
        geotab.addin.fleetEfficiency = () => {
            return {
                initialize(api, state, callback) {
                    const now = new Date();
                    document.getElementById("dateStart").value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                    document.getElementById("dateEnd").value = now.toISOString().split('T')[0];
                    document.getElementById("btnRun").addEventListener("click", () => this.fetchData(api));
                    document.getElementById("btnExport").addEventListener("click", () => {
                        XLSX.writeFile(XLSX.utils.table_to_book(document.querySelector("table")), "Eficiencia_V10.xlsx");
                    });
                    this.fetchData(api);
                    callback();
                },

                async fetchData(api) {
                    document.getElementById("loader").style.display = "block";
                    const fromDate = new Date(document.getElementById("dateStart").value).toISOString();
                    const toDate = new Date(document.getElementById("dateEnd").value).toISOString();

                    try {
                        // 1. Obtener bases
                        const [devices, users, trips] = await Promise.all([
                            api.call("Get", { typeName: "Device" }),
                            api.call("Get", { typeName: "User" }),
                            api.call("Get", { typeName: "Trip", search: { fromDate, toDate } })
                        ]);

                        // 2. Intento múltiple de combustible: Total y de Viaje
                        const [fuelTotal, fuelTrip] = await Promise.all([
                            api.call("Get", { typeName: "StatusData", search: { fromDate, toDate, diagnosticSearch: { id: "DiagnosticFuelUsedId" } } }),
                            api.call("Get", { typeName: "StatusData", search: { fromDate, toDate, diagnosticSearch: { id: "DiagnosticTripFuelUsedId" } } })
                        ]);

                        this.render(devices, users, trips, fuelTotal, fuelTrip);
                    } catch (e) { console.error("Error en SDK:", e); }
                    finally { document.getElementById("loader").style.display = "none"; }
                },

                render(devices, users, trips, fuelTotal, fuelTrip) {
                    const body = document.getElementById("resBody");
                    body.innerHTML = "";

                    const userMap = {};
                    users.forEach(u => { userMap[u.id] = ((u.firstName || "") + " " + (u.lastName || "")).trim() || u.name; });

                    // Procesar combustible de ambas fuentes
                    const fMap = {};
                    const processFuel = (data) => {
                        data.forEach(f => {
                            const id = f.device.id;
                            const val = parseFloat(f.data);
                            if (!fMap[id]) fMap[id] = { min: val, max: val };
                            if (val < fMap[id].min) fMap[id].min = val;
                            if (val > fMap[id].max) fMap[id].max = val;
                        });
                    };
                    processFuel(fuelTotal);
                    processFuel(fuelTrip);

                    const stats = {};
                    trips.forEach(t => {
                        const vId = t.device.id;
                        const dId = t.driver ? t.driver.id : "NoDriverId";
                        const dName = (dId === "NoDriverId") ? "Desconocido" : (userMap[dId] || "Desconocido");

                        // FILTRO: Solo si hay movimiento real
                        if (t.distance > 0.05) {
                            if (!stats[vId]) stats[vId] = { d: 0, r: 0, fObj: 0, drvs: {} };
                            if (!stats[vId].drvs[dName]) stats[vId].drvs[dName] = { d: 0, r: 0, fObj: 0 };

                            let secs = 0;
                            if(typeof t.idlingDuration === "string") {
                                const p = t.idlingDuration.split(':');
                                secs = p.length === 3 ? (+p[0]*3600 + +p[1]*60 + +p[2]) : 0;
                            } else { secs = t.idlingDuration || 0; }

                            stats[vId].d += t.distance;
                            stats[vId].r += secs;
                            stats[vId].fObj += (t.fuelUsed || 0); // Tercera opción: combustible del objeto Trip
                            
                            stats[vId].drvs[dName].d += t.distance;
                            stats[vId].drvs[dName].r += secs;
                            stats[vId].drvs[dName].fObj += (t.fuelUsed || 0);
                        }
                    });

                    devices.forEach(dev => {
                        const s = stats[dev.id];
                        if (!s || s.d < 0.1) return;

                        // Prioridad de combustible: 1. StatusData (Diferencia) > 2. Trip.fuelUsed
                        let ltrs = fMap[dev.id] ? (fMap[dev.id].max - fMap[dev.id].min) : 0;
                        if (ltrs <= 0) ltrs = s.fObj; 

                        const gal = ltrs / 3.78541;
                        const eff = gal > 0 ? (s.d / gal).toFixed(2) : "0.00";

                        body.innerHTML += `
                            <tr style="background: #eef2f7; font-weight: bold; border-left: 5px solid #254061; border-bottom: 1px solid #dee2e6;">
                                <td style="padding: 12px;">🚚 ${dev.name}</td>
                                <td style="text-align:center;">${s.d.toFixed(1)}</td>
                                <td style="text-align:center; color: #254061;">${gal.toFixed(1)}</td>
                                <td style="text-align:center;">${(s.r / 3600).toFixed(1)}</td>
                                <td style="text-align:center; color: #27ae60;">${eff} km/G</td>
                            </tr>`;

                        Object.keys(s.drvs).forEach(name => {
                            const d = s.drvs[name];
                            // Calcular galones proporcionales por conductor
                            const dGal = s.d > 0 ? gal * (d.d / s.d) : 0;
                            body.innerHTML += `
                                <tr style="background: white; border-bottom: 1px solid #eee; color: #555; font-size: 13px;">
                                    <td style="padding: 10px 10px 10px 45px;">👤 ${name}</td>
                                    <td style="text-align:center;">${d.d.toFixed(1)}</td>
                                    <td style="text-align:center;">${dGal.toFixed(1)}</td>
                                    <td style="text-align:center;">${(d.r / 3600).toFixed(1)}</td>
                                    <td style="text-align:center;">--</td>
                                </tr>`;
                        });
                    });
                }
            };
        };
    </script>
</body>
</html>
