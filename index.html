<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        /* Estilos integrados para asegurar que Geotab los tome */
        body { font-family: sans-serif; background-color: #f4f7f9; padding: 10px; }
        .main-container { border: 1px solid #ccc; background: white; border-radius: 8px; overflow: hidden; }
        .header { background: #254061; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
        .toolbar { padding: 15px; background: #eee; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f0f0f0; padding: 10px; text-align: left; border-bottom: 2px solid #ccc; color: #254061; }
        td { padding: 8px 10px; border-bottom: 1px solid #eee; }
        .row-v { background: #e9ecef; font-weight: bold; }
        .row-d { font-size: 0.9em; color: #555; }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-blue { background: #254061; color: white; }
        .btn-green { background: #28a745; color: white; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">Rendimiento y Eficiencia de Flota</div>
        <div class="toolbar">
            <label>Desde: <input type="date" id="dateStart"></label>
            <label>Hasta: <input type="date" id="dateEnd"></label>
            <button id="btnRun" class="btn btn-blue">Actualizar</button>
            <button id="btnExport" class="btn btn-green">Excel</button>
            <span id="msg" style="color: #d35400; font-weight: bold; display: none;">⌛ Cargando...</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Vehículo / Conductor</th>
                    <th>Distancia (km)</th>
                    <th>Combustible (Gal)</th>
                    <th>Ralentí (Hrs)</th>
                    <th>Eficiencia (km/Gal)</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
        geotab.addin.fleetEfficiency = () => {
            return {
                initialize(api, state, callback) {
                    // 3. CARGA INICIAL: Establecer fechas del último mes (Mes actual)
                    const ahora = new Date();
                    const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1);
                    
                    document.getElementById("dateStart").value = inicioMes.toISOString().split('T')[0];
                    document.getElementById("dateEnd").value = ahora.toISOString().split('T')[0];

                    document.getElementById("btnRun").addEventListener("click", () => this.getData(api));
                    document.getElementById("btnExport").addEventListener("click", () => {
                        const wb = XLSX.utils.table_to_book(document.querySelector("table"));
                        XLSX.writeFile(wb, "Reporte_Eficiencia.xlsx");
                    });

                    // Ejecutar carga automática al abrir
                    this.getData(api);
                    callback();
                },

                async getData(api) {
                    const msg = document.getElementById("msg");
                    msg.style.display = "inline";
                    const from = new Date(document.getElementById("dateStart").value).toISOString();
                    const to = new Date(document.getElementById("dateEnd").value).toISOString();

                    try {
                        const [devices, trips, fuel] = await Promise.all([
                            api.call("Get", { typeName: "Device" }),
                            api.call("Get", { typeName: "Trip", search: { fromDate: from, toDate: to } }),
                            api.call("Get", { 
                                typeName: "StatusData", 
                                search: { fromDate: from, toDate: to, diagnosticSearch: { id: "DiagnosticFuelUsedId" } } 
                            })
                        ]);

                        this.render(devices, trips, fuel);
                    } catch (e) { console.error(e); }
                    finally { msg.style.display = "none"; }
                },

                render(devices, trips, fuel) {
                    const body = document.getElementById("resBody");
                    body.innerHTML = "";

                    // Lógica de combustible (Diferencia acumulada)
                    const fMap = {};
                    fuel.forEach(f => {
                        if (!fMap[f.device.id]) fMap[f.device.id] = { f: f.data, l: f.data };
                        if (f.data < fMap[f.device.id].f) fMap[f.device.id].f = f.data;
                        if (f.data > fMap[f.device.id].l) fMap[f.device.id].l = f.data;
                    });

                    const stats = {};
                    trips.forEach(t => {
                        const id = t.device.id;
                        const drv = t.driver.id === "NoDriverId" ? "Sin Conductor" : (t.driver.name || "Desconocido");
                        if (!stats[id]) stats[id] = { d: 0, i: 0, drvs: {} };
                        if (!stats[id].drvs[drv]) stats[id].drvs[drv] = { d: 0, i: 0 };
                        
                        let iSecs = 0;
                        if(typeof t.idlingDuration === "string") {
                            const p = t.idlingDuration.split(':');
                            iSecs = (+p[0] * 3600) + (+p[1] * 60) + (+p[2]);
                        } else { iSecs = t.idlingDuration || 0; }

                        stats[id].d += t.distance || 0;
                        stats[id].i += iSecs;
                        stats[id].drvs[drv].d += t.distance || 0;
                        stats[id].drvs[drv].i += iSecs;
                    });

                    devices.forEach(dev => {
                        const s = stats[dev.id];
                        if (!s) return;

                        const gal = fMap[dev.id] ? (fMap[dev.id].l - fMap[dev.id].f) / 3.785 : 0;
                        const eff = gal > 0 ? (s.d / gal).toFixed(2) : "0.00";

                        body.innerHTML += `<tr class="row-v">
                            <td>🚚 ${dev.name}</td><td>${s.d.toFixed(1)}</td><td>${gal.toFixed(1)}</td>
                            <td>${(s.i / 3600).toFixed(1)}</td><td>${eff}</td>
                        </tr>`;

                        Object.keys(s.drvs).forEach(dName => {
                            const d = s.drvs[dName];
                            const dGal = gal * (d.d / s.d);
                            body.innerHTML += `<tr class="row-d">
                                <td style="padding-left:30px;">👤 ${dName}</td><td>${d.d.toFixed(1)}</td>
                                <td>${dGal.toFixed(1)}</td><td>${(d.i / 3600).toFixed(1)}</td><td>--</td>
                            </tr>`;
                        });
                    });
                }
            };
        };
    </script>
</body>
</html>
