<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 20px;">
    <div style="max-width: 1200px; margin: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
        
        <div style="background: #254061; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 20px; letter-spacing: 0.5px;">Rendimiento y Eficiencia de Flota</h2>
            <div id="loader" style="display:none; font-size: 13px; background: #e67e22; padding: 4px 12px; border-radius: 20px; font-weight: bold;">Sincronizando con Motor...</div>
        </div>

        <div style="padding: 20px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; gap: 15px; align-items: center;">
            <div style="display:flex; flex-direction:column;">
                <label style="font-size: 11px; font-weight: bold; color: #666; margin-bottom: 4px;">DESDE</label>
                <input type="date" id="dateStart" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="display:flex; flex-direction:column;">
                <label style="font-size: 11px; font-weight: bold; color: #666; margin-bottom: 4px;">HASTA</label>
                <input type="date" id="dateEnd" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="margin-top: 18px;">
                <button id="btnRun" style="background: #254061; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;">ACTUALIZAR</button>
                <button id="btnExcel" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px;">EXCEL</button>
            </div>
        </div>

        <table style="width: 100%; border-collapse: collapse; background: white;">
            <thead>
                <tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                    <th style="padding: 15px; text-align: left; font-size: 13px; color: #333;">VEHÍCULO / CONDUCTOR</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">DISTANCIA (KM)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">COMBUSTIBLE (GAL)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">RALENTÍ (HRS)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">EFICIENCIA</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
        geotab.addin.fleetEfficiency = () => {
            return {
                initialize(api, state, callback) {
                    const now = new Date();
                    document.getElementById("dateStart").value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                    document.getElementById("dateEnd").value = now.toISOString().split('T')[0];
                    
                    document.getElementById("btnRun").addEventListener("click", () => this.fetch(api));
                    document.getElementById("btnExcel").addEventListener("click", () => {
                        XLSX.writeFile(XLSX.utils.table_to_book(document.querySelector("table")), "Reporte_Rendimiento.xlsx");
                    });

                    this.fetch(api);
                    callback();
                },

                async fetch(api) {
                    document.getElementById("loader").style.display = "block";
                    const from = new Date(document.getElementById("dateStart").value).toISOString();
                    const to = new Date(document.getElementById("dateEnd").value).toISOString();

                    try {
                        // CONSULTA CLAVE: Trips y StatusData para combustible
                        const [devices, trips, fuelData] = await Promise.all([
                            api.call("Get", { typeName: "Device" }),
                            api.call("Get", { typeName: "Trip", search: { fromDate: from, toDate: to } }),
                            api.call("Get", { 
                                typeName: "StatusData", 
                                search: { 
                                    fromDate: from, 
                                    toDate: to, 
                                    diagnosticSearch: { id: "DiagnosticFuelUsedId" } 
                                } 
                            })
                        ]);

                        this.process(devices, trips, fuelData);
                    } catch (e) {
                        console.error(e);
                        alert("Error de conexión con el servidor Geotab.");
                    } finally {
                        document.getElementById("loader").style.display = "none";
                    }
                },

                process(devices, trips, fuel) {
                    const body = document.getElementById("resBody");
                    body.innerHTML = "";

                    // 1. Mapa de Combustible (Max - Min)
                    const fMap = {};
                    fuel.forEach(f => {
                        const id = f.device.id;
                        const val = parseFloat(f.data);
                        if (!fMap[id]) fMap[id] = { s: val, e: val };
                        if (val < fMap[id].s) fMap[id].s = val;
                        if (val > fMap[id].e) fMap[id].e = val;
                    });

                    // 2. Agrupar por Vehículo y Conductor
                    const stats = {};
                    trips.forEach(t => {
                        const vId = t.device.id;
                        // Forzar el nombre del conductor desde el objeto de viaje
                        const drvName = (t.driver && t.driver.id !== "NoDriverId") 
                                        ? (t.driver.name || "Conductor " + t.driver.id.substring(0,5)) 
                                        : "Sin Conductor Asignado";

                        if (!stats[vId]) stats[vId] = { dist: 0, idle: 0, drivers: {} };
                        if (!stats[vId].drivers[drvName]) stats[vId].drivers[drvName] = { dist: 0, idle: 0 };

                        let secs = 0;
                        if(typeof t.idlingDuration === "string") {
                            const p = t.idlingDuration.split(':');
                            secs = p.length === 3 ? (+p[0]*3600 + +p[1]*60 + +p[2]) : 0;
                        } else { secs = t.idlingDuration || 0; }

                        stats[vId].dist += t.distance || 0;
                        stats[vId].idle += secs;
                        stats[id = vId].drivers[drvName].dist += t.distance || 0;
                        stats[id = vId].drivers[drvName].idle += secs;
                    });

                    // 3. Renderizar
                    devices.forEach(dev => {
                        const data = stats[dev.id];
                        if (!data) return;

                        const liters = fMap[dev.id] ? (fMap[dev.id].e - fMap[dev.id].s) : 0;
                        const gal = liters / 3.78541;
                        const efficiency = gal > 0 ? (data.dist / gal).toFixed(2) : "0.00";

                        // FILA VEHÍCULO
                        body.innerHTML += `
                            <tr style="background: #eef2f7; font-weight: bold; border-left: 4px solid #254061;">
                                <td style="padding: 12px;">🚚 ${dev.name}</td>
                                <td style="text-align:center;">${data.dist.toFixed(1)}</td>
                                <td style="text-align:center; color: #254061;">${gal.toFixed(1)}</td>
                                <td style="text-align:center;">${(data.idle / 3600).toFixed(1)}</td>
                                <td style="text-align:center; color: #27ae60;">${efficiency}</td>
                            </tr>`;

                        // FILAS CONDUCTORES
                        Object.keys(data.drivers).forEach(name => {
                            const d = data.drivers[name];
                            const dGal = data.dist > 0 ? gal * (d.dist / data.dist) : 0;
                            body.innerHTML += `
                                <tr style="background: white; color: #666; font-size: 13px;">
                                    <td style="padding: 10px 10px 10px 45px;">👤 ${name}</td>
                                    <td style="text-align:center;">${d.dist.toFixed(1)}</td>
                                    <td style="text-align:center;">${dGal.toFixed(1)}</td>
                                    <td style="text-align:center;">${(d.idle / 3600).toFixed(1)}</td>
                                    <td style="text-align:center;">--</td>
                                </tr>`;
                        });
                    });
                }
            };
        };
    </script>
</body>
</html>
