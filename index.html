<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte de Flota</title>
</head>
<body style="font-family: sans-serif; background: #f4f7f9; margin: 0; padding: 20px;">

    <div id="root-container" style="max-width: 1000px; margin: auto; background: white; border: 1px solid #ccc; border-radius: 5px;">
        
        <div style="background: #254061; color: white; padding: 15px;">
            <h2 style="margin: 0; font-size: 18px;">Rendimiento de Flota - Modo Seguro</h2>
        </div>

        <div style="padding: 15px; border-bottom: 1px solid #eee; display: flex; gap: 10px;">
            <input type="date" id="dateStart" style="padding: 5px;">
            <input type="date" id="dateEnd" style="padding: 5px;">
            <button id="btnRun" style="background: #254061; color: white; border: none; padding: 8px 15px; cursor: pointer;">ACTUALIZAR</button>
            <span id="loading" style="display:none; color: orange; font-weight: bold;">Cargando...</span>
        </div>

        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: #eee;">
                    <th style="padding: 10px; text-align: left; border-bottom: 1px solid #ccc;">Vehiculo / Conductor</th>
                    <th style="padding: 10px; text-align: center; border-bottom: 1px solid #ccc;">KM</th>
                    <th style="padding: 10px; text-align: center; border-bottom: 1px solid #ccc;">GAL</th>
                    <th style="padding: 10px; text-align: center; border-bottom: 1px solid #ccc;">Eficiencia</th>
                </tr>
            </thead>
            <tbody id="resBody">
                <tr><td colspan="4" style="padding: 20px; text-align: center;">Presione Actualizar</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        geotab.addin.fleetEfficiency = () => {
            return {
                initialize(api, state, callback) {
                    const now = new Date();
                    document.getElementById("dateStart").value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                    document.getElementById("dateEnd").value = now.toISOString().split('T')[0];

                    document.getElementById("btnRun").addEventListener("click", () => {
                        this.fetch(api);
                    });

                    callback();
                },

                async fetch(api) {
                    const loader = document.getElementById("loading");
                    loader.style.display = "inline";
                    const from = new Date(document.getElementById("dateStart").value).toISOString();
                    const to = new Date(document.getElementById("dateEnd").value).toISOString();

                    try {
                        const devices = await api.call("Get", { typeName: "Device" });
                        const trips = await api.call("Get", { typeName: "Trip", search: { fromDate: from, toDate: to } });
                        
                        this.render(devices, trips);
                    } catch (e) {
                        console.error(e);
                    } finally {
                        loader.style.display = "none";
                    }
                },

                render(devices, trips) {
                    const body = document.getElementById("resBody");
                    body.innerHTML = "";

                    const stats = {};
                    trips.forEach(t => {
                        const vId = t.device.id;
                        if (t.distance > 0.1) {
                            if (!stats[vId]) stats[vId] = { d: 0, f: 0 };
                            stats[vId].d += t.distance;
                            stats[vId].f += (t.fuelUsed || 0);
                        }
                    });

                    devices.forEach(dev => {
                        const s = stats[dev.id];
                        if (!s) return;

                        const gal = s.f / 3.785;
                        const eff = gal > 0 ? (s.d / gal).toFixed(2) : "0.00";

                        body.innerHTML += `
                            <tr style="background: #f9f9f9; font-weight: bold;">
                                <td style="padding: 10px; border-bottom: 1px solid #ddd;">Vehiculo: ${dev.name}</td>
                                <td style="text-align: center;">${s.d.toFixed(1)}</td>
                                <td style="text-align: center;">${gal.toFixed(1)}</td>
                                <td style="text-align: center;">${eff}</td>
                            </tr>
                        `;
                    });
                }
            };
        };
    </script>
</body>
</html>
