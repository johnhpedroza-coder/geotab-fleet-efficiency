<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: sans-serif; background: #f4f7f9; margin: 0; padding: 20px;">
    <div style="max-width: 1200px; margin: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
        
        <div style="background: #254061; color: white; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 20px;">Eficiencia de Flota</h2>
            <div id="loader" style="display:none; background: #e67e22; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;">Procesando...</div>
        </div>

        <div style="padding: 15px 25px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; gap: 15px; align-items: center;">
            <label style="font-size: 13px;">Desde: <input type="date" id="dateStart" style="padding: 5px; border: 1px solid #ccc;"></label>
            <label style="font-size: 13px;">Hasta: <input type="date" id="dateEnd" style="padding: 5px; border: 1px solid #ccc;"></label>
            <button id="btnRun" style="background: #254061; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">ACTUALIZAR</button>
            <button id="btnExport" style="background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">EXCEL</button>
        </div>

        <table style="width: 100%; border-collapse: collapse; background: white;">
            <thead>
                <tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                    <th style="padding: 15px; text-align: left; font-size: 13px; color: #333;">VEHÍCULO / CONDUCTOR</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">DISTANCIA (KM)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">COMBUSTIBLE (GAL)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">RALENTÍ (HRS)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">EFICIENCIA</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
        geotab.addin.fleetEfficiency = () => {
            return {
                initialize(api, state, callback) {
                    const now = new Date();
                    document.getElementById("dateStart").value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                    document.getElementById("dateEnd").value = now.toISOString().split('T')[0];
                    document.getElementById("btnRun").addEventListener("click", () => this.execute(api));
                    document.getElementById("btnExport").addEventListener("click", () => {
                        const wb = XLSX.utils.table_to_book(document.querySelector("table"));
                        XLSX.writeFile(wb, "Reporte_Eficiencia.xlsx");
                    });
                    this.execute(api);
                    callback();
                },

                async execute(api) {
                    document.getElementById("loader").style.display = "block";
                    const from = new Date(document.getElementById("dateStart").value).toISOString();
                    const to = new Date(document.getElementById("dateEnd").value).toISOString();

                    try {
                        const [devices, users, trips, fuel] = await Promise.all([
                            api.call("Get", { typeName: "Device" }),
                            api.call("Get", { typeName: "User" }),
                            api.call("Get", { typeName: "Trip", search: { fromDate: from, toDate: to } }),
                            api.call("Get", { 
                                typeName: "StatusData", 
                                search: { fromDate: from, toDate: to, diagnosticSearch: { id: "DiagnosticFuelUsedId" } } 
                            })
                        ]);

                        this.render(devices, users, trips, fuel);
                    } catch (e) { console.error("Error en API:", e); }
                    finally { document.getElementById("loader").style.display = "none"; }
                },

                render(devices, users, trips, fuel) {
                    const body = document.getElementById("resBody");
                    body.innerHTML = "";

                    const userMap = {};
                    users.forEach(u => {
                        userMap[u.id] = (u.firstName || "") + " " + (u.lastName || "") || u.name;
                    });

                    const fMap = {};
                    fuel.forEach(f => {
                        const id = f.device.id;
                        const val = parseFloat(f.data);
                        if (!fMap[id]) fMap[id] = { min: val, max: val };
                        if (val < fMap[id].min) fMap[id].min = val;
                        if (val > fMap[id].max) fMap[id].max = val;
                    });

                    const stats = {};
                    trips.forEach(t => {
                        const vId = t.device.id;
                        const dId = t.driver ? t.driver.id : "NoDriverId";
                        const dName = dId === "NoDriverId" ? "Sin Conductor" : (userMap[dId] || "Desconocido");

                        if (!stats[vId]) stats[vId] = { d: 0, r: 0, drvs: {} };
                        
                        // FILTRO CRÍTICO: Solo conductores con distancia > 0
                        if (t.distance > 0.01) {
                            if (!stats[vId].drvs[dName]) stats[vId].drvs[dName] = { d: 0, r: 0 };
                            
                            let rSecs = 0;
                            if(typeof t.idlingDuration === "string" && t.idlingDuration.includes(":")) {
                                const p = t.idlingDuration.split(':');
                                rSecs = (+p[0]*3600) + (+p[1]*60) + (+p[2]);
                            } else { rSecs = parseFloat(t.idlingDuration) || 0; }

                            stats[vId].d += t.distance || 0;
                            stats[vId].r += rSecs;
                            stats[vId].drvs[dName].d += t.distance || 0;
                            stats[vId].drvs[dName].r += rSecs;
                        }
                    });

                    devices.forEach(dev => {
                        const s = stats[dev.id];
                        if (!s || s.d < 0.1) return;

                        const ltrs = fMap[dev.id] ? (fMap[dev.id].max - fMap[dev.id].min) : 0;
                        const gal = ltrs / 3.78541;
                        const eff = gal > 0 ? (s.d / gal).toFixed(2) : "0.00";

                        body.innerHTML += `
                            <tr style="background: #eef2f7; font-weight: bold; border-left: 5px solid #254061;">
                                <td style="padding: 12px;">Vehículo: ${dev.name}</td>
                                <td style="text-align:center;">${s.d.toFixed(1)}</td>
                                <td style="text-align:center;">${gal.toFixed(1)}</td>
                                <td style="text-align:center;">${(s.r / 3600).toFixed(1)}</td>
                                <td style="text-align:center;">${eff} km/G</td>
                            </tr>`;

                        Object.keys(s.drvs).forEach(name => {
                            const d = s.drvs[name];
                            const dGal = gal * (d.d / s.d);
                            body.innerHTML += `
                                <tr style="background: white; border-bottom: 1px solid #eee; color: #555; font-size: 13px;">
                                    <td style="padding: 10px 10px 10px 45px;">Conductor: ${name}</td>
                                    <td style="text-align:center;">${d.d.toFixed(1)}</td>
                                    <td style="text-align:center;">${dGal.toFixed(1)}</td>
                                    <td style="text-align:center;">${(d.r / 3600).toFixed(1)}</td>
                                    <td style="text-align:center;">--</td>
                                </tr>`;
                        });
                    });
                }
            };
        };
    </script>
</body>
</html>
