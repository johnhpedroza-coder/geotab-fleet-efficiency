<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 20px;">
    <div style="max-width: 1200px; margin: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
        
        <div style="background: #254061; color: white; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 20px;">Rendimiento y Eficiencia de Flota</h2>
            <div id="loader" style="display:none; background: #e67e22; padding: 4px 15px; border-radius: 20px; font-size: 12px; font-weight: bold;">Calculando combustible...</div>
        </div>

        <div style="padding: 15px 25px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; gap: 15px; align-items: center;">
            <label style="font-size: 13px; font-weight: bold;">Desde: <input type="date" id="dateStart" style="padding: 6px; border: 1px solid #ccc; border-radius: 4px;"></label>
            <label style="font-size: 13px; font-weight: bold;">Hasta: <input type="date" id="dateEnd" style="padding: 6px; border: 1px solid #ccc; border-radius: 4px;"></label>
            <button id="btnRun" style="background: #254061; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">ACTUALIZAR</button>
            <button id="btnExport" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px;">EXCEL</button>
        </div>

        <table id="resultsTable" style="width: 100%; border-collapse: collapse; background: white;">
            <thead>
                <tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                    <th style="padding: 15px; text-align: left; font-size: 13px; color: #333;">VEHÍCULO / CONDUCTOR</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">DISTANCIA (KM)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">COMBUSTIBLE (GAL)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">RALENTÍ (HRS)</th>
                    <th style="padding: 15px; text-align: center; font-size: 13px; color: #333;">EFICIENCIA</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
        geotab.addin.fleetEfficiency = () => {
            return {
                initialize(api, state, callback) {
                    const now = new Date();
                    document.getElementById("dateStart").value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                    document.getElementById("dateEnd").value = now.toISOString().split('T')[0];
                    document.getElementById("btnRun").addEventListener("click", () => this.execute(api));
                    document.getElementById("btnExport").addEventListener("click", () => {
                        const wb = XLSX.utils.table_to_book(document.getElementById("resultsTable"));
                        XLSX.writeFile(wb, "Reporte_Eficiencia_v9.xlsx");
                    });
                    this.execute(api);
                    callback();
                },

                async execute(api) {
                    const loader = document.getElementById("loader");
                    loader.style.display = "block";
                    const fromDate = new Date(document.getElementById("dateStart").value).toISOString();
                    const toDate = new Date(document.getElementById("dateEnd").value).toISOString();

                    try {
                        // 1. Obtener datos base
                        const [devices, users, trips] = await Promise.all([
                            api.call("Get", { typeName: "Device" }),
                            api.call("Get", { typeName: "User" }),
                            api.call("Get", { typeName: "Trip", search: { fromDate, toDate } })
                        ]);

                        // 2. Obtener combustible mediante una consulta de StatusData simplificada
                        // Buscamos solo el diagnóstico de combustible total
                        const fuelData = await api.call("Get", {
                            typeName: "StatusData",
                            search: {
                                fromDate,
                                toDate,
                                diagnosticSearch: { id: "DiagnosticFuelUsedId" }
                            }
                        });

                        this.process(devices, users, trips, fuelData);
                    } catch (e) {
                        console.error("Error en SDK Geotab:", e);
                    } finally {
                        loader.style.display = "none";
                    }
                },

                process(devices, users, trips, fuel) {
                    const body = document.getElementById("resBody");
                    body.innerHTML = "";

                    // Mapa de usuarios para nombres reales
                    const userMap = {};
                    users.forEach(u => {
                        const name = ((u.firstName || "") + " " + (u.lastName || "")).trim();
                        userMap[u.id] = name || u.name;
                    });

                    // Mapa de Combustible (Calculamos la diferencia)
                    const fuelMap = {};
                    fuel.forEach(f => {
                        const dId = f.device.id;
                        const val = parseFloat(f.data);
                        if (!fuelMap[dId]) fuelMap[dId] = { start: val, end: val };
                        if (val < fuelMap[dId].start) fuelMap[dId].start = val;
                        if (val > fuelMap[dId].end) fuelMap[dId].end = val;
                    });

                    const stats = {};
                    trips.forEach(t => {
                        const vId = t.device.id;
                        const dId = t.driver ? t.driver.id : "NoDriverId";
                        const dName = (dId === "NoDriverId") ? "Desconocido" : (userMap[dId] || "Desconocido");

                        // Filtro: Solo conductores con distancia real
                        if (t.distance > 0) {
                            if (!stats[vId]) stats[vId] = { dist: 0, idle: 0, drvs: {} };
                            if (!stats[vId].drvs[dName]) stats[vId].drvs[dName] = { dist: 0, idle: 0 };

                            let idleSecs = 0;
                            if (typeof t.idlingDuration === "string" && t.idlingDuration.includes(":")) {
                                const p = t.idlingDuration.split(':');
                                idleSecs = (+p[0] * 3600) + (+p[1] * 60) + (+p[2]);
                            } else { idleSecs = parseFloat(t.idlingDuration) || 0; }

                            stats[vId].dist += t.distance || 0;
                            stats[vId].idle += idleSecs;
                            stats[vId].drvs[dName].dist += t.distance || 0;
                            stats[vId].drvs[dName].idle += idleSecs;
                        }
                    });

                    devices.forEach(dev => {
                        const s = stats[dev.id];
                        if (!s || s.dist < 0.1) return;

                        // Consumo: Litros -> Galones
                        const consumption = fuelMap[dev.id] ? (fuelMap[dev.id].end - fuelMap[dev.id].start) : 0;
                        const gal = consumption / 3.78541;
                        const efficiency = gal > 0 ? (s.dist / gal).toFixed(2) : "0.00";

                        // Fila Vehículo (Con Icono)
                        body.innerHTML += `
                            <tr style="background: #eef2f7; font-weight: bold; border-left: 5px solid #254061; border-bottom: 1px solid #dee2e6;">
                                <td style="padding: 12px;">🚚 ${dev.name}</td>
                                <td style="text-align:center;">${s.dist.toFixed(1)}</td>
                                <td style="text-align:center; color: #254061;">${gal.toFixed(1)}</td>
                                <td style="text-align:center;">${(s.idle / 3600).toFixed(1)}</td>
                                <td style="text-align:center; color: #27ae60;">${efficiency} km/G</td>
                            </tr>`;

                        // Filas Conductores (Con Icono y Sangría)
                        Object.keys(s.drvs).forEach(name => {
                            const d = s.drvs[name];
                            const dGal = s.dist > 0 ? gal * (d.dist / s.dist) : 0;
                            body.innerHTML += `
                                <tr style="background: white; border-bottom: 1px solid #eee; color: #555; font-size: 13px;">
                                    <td style="padding: 10px 10px 10px 45px;">👤 ${name}</td>
                                    <td style="text-align:center;">${d.dist.toFixed(1)}</td>
                                    <td style="text-align:center;">${dGal.toFixed(1)}</td>
                                    <td style="text-align:center;">${(d.idle / 3600).toFixed(1)}</td>
                                    <td style="text-align:center;">--</td>
                                </tr>`;
                        });
                    });
                }
            };
        };
    </script>
</body>
</html>
