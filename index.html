<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px;">
    <div style="max-width: 1200px; margin: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
        
        <div style="background: #254061; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 20px;">📊 Rendimiento y Eficiencia de Flota</h2>
            <div id="loader" style="display:none; background: #e67e22; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold;">PROCESANDO...</div>
        </div>

        <div style="padding: 15px 25px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; gap: 15px; align-items: center;">
            <label style="font-size: 13px; font-weight: bold;">Desde: <input type="date" id="dateStart" style="padding: 6px; border: 1px solid #ccc;"></label>
            <label style="font-size: 13px; font-weight: bold;">Hasta: <input type="date" id="dateEnd" style="padding: 6px; border: 1px solid #ccc;"></label>
            <button id="btnRun" style="background: #254061; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">ACTUALIZAR</button>
            <span id="fuelStatus" style="font-size: 12px; color: #d35400; font-weight: bold;"></span>
        </div>

        <table style="width: 100%; border-collapse: collapse; background: white;">
            <thead>
                <tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                    <th style="padding: 15px; text-align: left; width: 40%;">VEHÍCULO / CONDUCTOR</th>
                    <th style="padding: 15px; text-align: center;">DISTANCIA (KM)</th>
                    <th style="padding: 15px; text-align: center;">COMBUSTIBLE (GAL)</th>
                    <th style="padding: 15px; text-align: center;">RALENTÍ (HRS)</th>
                    <th style="padding: 15px; text-align: center;">EFICIENCIA</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>

    <script>
        geotab.addin.fleetEfficiency = () => {
            return {
                initialize(api, state, callback) {
                    const now = new Date();
                    document.getElementById("dateStart").value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                    document.getElementById("dateEnd").value = now.toISOString().split('T')[0];
                    document.getElementById("btnRun").addEventListener("click", () => this.execute(api));
                    this.execute(api);
                    callback();
                },

                async execute(api) {
                    const loader = document.getElementById("loader");
                    const status = document.getElementById("fuelStatus");
                    loader.style.display = "block";
                    
                    const from = new Date(document.getElementById("dateStart").value).toISOString();
                    const to = new Date(document.getElementById("dateEnd").value).toISOString();

                    try {
                        const [devices, users, trips, fuel] = await Promise.all([
                            api.call("Get", { typeName: "Device" }),
                            api.call("Get", { typeName: "User" }),
                            api.call("Get", { typeName: "Trip", search: { fromDate: from, toDate: to } }),
                            api.call("Get", { 
                                typeName: "StatusData", 
                                search: { 
                                    fromDate: from, toDate: to, 
                                    diagnosticSearch: { id: "DiagnosticFuelUsedId" } 
                                } 
                            })
                        ]);

                        status.innerText = fuel.length > 0 ? "" : "Dato de motor restringido por Plan GO";
                        this.render(devices, users, trips, fuel);
                    } catch (e) {
                        console.error(e);
                    } finally {
                        loader.style.display = "none";
                    }
                },

                render(devices, users, trips, fuel) {
                    const body = document.getElementById("resBody");
                    body.innerHTML = "";

                    const uMap = {};
                    users.forEach(u => {
                        const name = ((u.firstName || "") + " " + (u.lastName || "")).trim();
                        if(name && u.id !== "NoDriverId") uMap[u.id] = name;
                    });

                    const fMap = {};
                    fuel.forEach(f => {
                        const id = f.device.id;
                        const val = parseFloat(f.data);
                        if (!fMap[id]) fMap[id] = { s: val, e: val };
                        if (val < fMap[id].s) fMap[id].s = val;
                        if (val > fMap[id].e) fMap[id].e = val;
                    });

                    const stats = {};
                    trips.forEach(t => {
                        const vId = t.device.id;
                        const dId = t.driver ? t.driver.id : null;
                        const dName = uMap[dId] || null; // Si no tiene nombre real, es null

                        if (t.distance > 0.1) {
                            if (!stats[vId]) stats[vId] = { d: 0, r: 0, fT: 0, drvs: {} };
                            
                            let secs = 0;
                            const dur = (t.idlingDuration || "0").toString();
                            if(dur.includes(":")) {
                                const p = dur.split(':');
                                secs = (+p[0]*3600 + +p[1]*60 + +p[2]);
                            } else { secs = parseFloat(dur) || 0; }

                            stats[vId].d += t.distance;
                            stats[vId].r += secs;
                            stats[vId].fT += (t.fuelUsed || 0);

                            // Solo agregar al desglose si el conductor tiene nombre
                            if (dName) {
                                if (!stats[vId].drvs[dName]) stats[vId].drvs[dName] = { d: 0, r: 0, fT: 0 };
                                stats[vId].drvs[dName].d += t.distance;
                                stats[vId].drvs[dName].r += secs;
                                stats[vId].drvs[dName].fT += (t.fuelUsed || 0);
                            }
                        }
                    });

                    devices.forEach(dev => {
                        const s = stats[dev.id];
                        if (!s) return;

                        let liters = (fMap[dev.id] ? (fMap[dev.id].e - fMap[dev.id].s) : 0) || s.fT || 0;
                        const gal = liters / 3.78541;
                        const eff = gal > 0 ? (s.d / gal).toFixed(2) : "0.00";

                        body.innerHTML += `
                            <tr style="background: #eef2f7; font-weight: bold; border-left: 5px solid #254061; border-bottom: 1px solid #dee2e6;">
                                <td style="padding: 15px;">🚚 ${dev.name}</td>
                                <td style="text-align:center;">${s.d.toFixed(1)}</td>
                                <td style="text-align:center; color: #254061;">${gal.toFixed(1)}</td>
                                <td style="text-align:center;">${(s.r / 3600).toFixed(1)}</td>
                                <td style="text-align:center; color: #27ae60;">${eff} km/G</td>
                            </tr>`;

                        Object.keys(s.drvs).forEach(name => {
                            const d = s.drvs[name];
                            const dGal = s.d > 0 ? gal * (d.d / s.d) : 0;
                            body.innerHTML += `
                                <tr style="background: white; border-bottom: 1px solid #eee; color: #666; font-size: 13px;">
                                    <td style="padding: 10px 10px 10px 45px;">👤 ${name}</td>
                                    <td style="text-align:center;">${d.d.toFixed(1)}</td>
                                    <td style="text-align:center;">${dGal.toFixed(1)}</td>
                                    <td style="text-align:center;">${(d.r / 3600).toFixed(1)}</td>
                                    <td style="text-align:center;">--</td>
                                </tr>`;
                        });
                    });
                }
            };
        };
    </script>
</body>
</html>
