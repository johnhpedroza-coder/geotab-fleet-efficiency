<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 20px;">
    <div style="max-width: 1200px; margin: auto; background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden;">
        <div style="background: #254061; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 22px;">📊 Reporte de Eficiencia y Combustible</h2>
            <div id="loader" style="display:none; background: #e67e22; padding: 5px 15px; border-radius: 20px; font-size: 13px; font-weight: bold;">Consultando Motores...</div>
        </div>

        <div style="padding: 20px; background: #fff; border-bottom: 1px solid #eee; display: flex; gap: 20px; align-items: center;">
            <div>
                <label style="display:block; font-size: 12px; color: #666; font-weight: bold; margin-bottom: 5px;">FECHA INICIO</label>
                <input type="date" id="dateStart" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div>
                <label style="display:block; font-size: 12px; color: #666; font-weight: bold; margin-bottom: 5px;">FECHA FIN</label>
                <input type="date" id="dateEnd" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="display: flex; gap: 10px; align-items: flex-end; margin-top: 20px;">
                <button id="btnRun" style="background: #254061; color: white; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold;">GENERAR</button>
                <button id="btnExcel" style="background: #27ae60; color: white; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold;">EXCEL</button>
            </div>
        </div>

        <table id="targetTable" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                    <th style="padding: 15px; text-align: left; color: #333;">VEHÍCULO / CONDUCTOR</th>
                    <th style="padding: 15px; text-align: center; color: #333;">DISTANCIA (KM)</th>
                    <th style="padding: 15px; text-align: center; color: #333;">COMBUSTIBLE (GAL)</th>
                    <th style="padding: 15px; text-align: center; color: #333;">RALENTÍ (HRS)</th>
                    <th style="padding: 15px; text-align: center; color: #333;">RENDIMIENTO</th>
                </tr>
            </thead>
            <tbody id="resBody">
                <tr><td colspan="5" style="padding: 40px; text-align: center; color: #999;">Esperando selección de fechas...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
        geotab.addin.fleetEfficiency = () => {
            return {
                initialize(api, state, callback) {
                    const d = new Date();
                    document.getElementById("dateStart").value = new Date(d.getFullYear(), d.getMonth(), 1).toISOString().split('T')[0];
                    document.getElementById("dateEnd").value = d.toISOString().split('T')[0];
                    
                    document.getElementById("btnRun").addEventListener("click", () => this.run(api));
                    document.getElementById("btnExcel").addEventListener("click", () => {
                        XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("targetTable")), "Eficiencia_Flota.xlsx");
                    });

                    this.run(api);
                    callback();
                },

                async run(api) {
                    const loader = document.getElementById("loader");
                    loader.style.display = "block";
                    const from = new Date(document.getElementById("dateStart").value).toISOString();
                    const to = new Date(document.getElementById("dateEnd").value).toISOString();

                    try {
                        // CONSULTA MULTIPLE
                        const [devices, trips] = await Promise.all([
                            api.call("Get", { typeName: "Device" }),
                            api.call("Get", { typeName: "Trip", search: { fromDate: from, toDate: to } })
                        ]);

                        // CONSULTA DE COMBUSTIBLE ESPECÍFICA (GetFuelUsed)
                        // Esta función de Geotab es más precisa que buscar diagnósticos manuales
                        const fuelData = await api.call("GetFuelUsed", {
                            search: { fromDate: from, toDate: to }
                        });

                        this.render(devices, trips, fuelData);
                    } catch (e) {
                        console.error("Error SDK:", e);
                        alert("Error al obtener datos. Verifique permisos de motor.");
                    } finally {
                        loader.style.display = "none";
                    }
                },

                render(devices, trips, fuelData) {
                    const tbody = document.getElementById("resBody");
                    tbody.innerHTML = "";

                    // Mapear combustible calculado por Geotab
                    const fuelMap = {};
                    fuelData.forEach(f => {
                        fuelMap[f.device.id] = f.fuelUsed; // Viene en Litros
                    });

                    const stats = {};
                    trips.forEach(t => {
                        const id = t.device.id;
                        const drv = t.driver.id === "NoDriverId" ? "Sin Conductor" : (t.driver.name || "Desconocido");
                        if (!stats[id]) stats[id] = { d: 0, i: 0, drvs: {} };
                        if (!stats[id].drvs[drv]) stats[id].drvs[drv] = { d: 0, i: 0 };
                        
                        let iSecs = 0;
                        if(typeof t.idlingDuration === "string") {
                            const p = t.idlingDuration.split(':');
                            iSecs = p.length === 3 ? (+p[0]*3600 + +p[1]*60 + +p[2]) : 0;
                        } else { iSecs = t.idlingDuration || 0; }

                        stats[id].d += t.distance || 0;
                        stats[id].i += iSecs;
                        stats[id].drvs[drv].d += t.distance || 0;
                        stats[id].drvs[drv].i += iSecs;
                    });

                    devices.forEach(dev => {
                        const s = stats[dev.id];
                        if (!s) return;

                        const gal = (fuelMap[dev.id] || 0) / 3.78541;
                        const eff = gal > 0 ? (s.d / gal).toFixed(2) : "0.00";

                        // FILA VEHÍCULO (Azul claro)
                        tbody.innerHTML += `
                            <tr style="background: #eef2f7; font-weight: bold; border-left: 5px solid #254061;">
                                <td style="padding: 12px;">🚚 ${dev.name}</td>
                                <td style="text-align:center;">${s.d.toFixed(1)}</td>
                                <td style="text-align:center; color: ${gal > 0 ? '#27ae60' : '#c0392b'};">${gal.toFixed(1)}</td>
                                <td style="text-align:center;">${(s.i / 3600).toFixed(1)}</td>
                                <td style="text-align:center;">${eff} km/Gal</td>
                            </tr>`;

                        // FILA CONDUCTOR
                        Object.keys(s.drvs).forEach(dName => {
                            const d = s.drvs[dName];
                            const dGal = s.d > 0 ? gal * (d.d / s.d) : 0;
                            tbody.innerHTML += `
                                <tr style="background: #fff; color: #666;">
                                    <td style="padding: 10px 10px 10px 45px;">👤 ${dName}</td>
                                    <td style="text-align:center;">${d.d.toFixed(1)}</td>
                                    <td style="text-align:center;">${dGal.toFixed(1)}</td>
                                    <td style="text-align:center;">${(d.i / 3600).toFixed(1)}</td>
                                    <td style="text-align:center;">--</td>
                                </tr>`;
                        });
                    });
                }
            };
        };
    </script>
</body>
</html>
