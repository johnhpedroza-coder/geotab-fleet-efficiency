<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px;">
    <div style="max-width: 1200px; margin: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
        
        <div style="background: #c0392b; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 20px;">🔥 REPORTE V22 - FORZADO</h2>
            <div id="loader" style="display:none; background: #000; padding: 5px 15px; border-radius: 20px; font-size: 12px;">PROCESANDO...</div>
        </div>

        <div style="padding: 15px 25px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; gap: 15px; align-items: center;">
            <input type="date" id="dateStart" style="padding: 6px;">
            <input type="date" id="dateEnd" style="padding: 6px;">
            <button id="btnRun" style="background: #c0392b; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">ACTUALIZAR</button>
            <span id="debug" style="font-size: 13px; color: #c0392b; font-weight: bold;"></span>
        </div>

        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                    <th style="padding: 15px; text-align: left;">VEHÍCULO / CONDUCTOR</th>
                    <th style="padding: 15px; text-align: center;">KM</th>
                    <th style="padding: 15px; text-align: center;">GAL</th>
                    <th style="padding: 15px; text-align: center;">RALENTÍ</th>
                    <th style="padding: 15px; text-align: center;">EFICIENCIA</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>

    <script>
        geotab.addin.fleetEfficiency = () => {
            return {
                initialize(api, state, callback) {
                    const now = new Date();
                    document.getElementById("dateStart").value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                    document.getElementById("dateEnd").value = now.toISOString().split('T')[0];
                    document.getElementById("btnRun").addEventListener("click", () => this.fetch(api));
                    this.fetch(api);
                    callback();
                },

                async fetch(api) {
                    document.getElementById("loader").style.display = "block";
                    const from = new Date(document.getElementById("dateStart").value).toISOString();
                    const to = new Date(document.getElementById("dateEnd").value).toISOString();

                    try {
                        const [devices, users, trips] = await Promise.all([
                            api.call("Get", { typeName: "Device" }),
                            api.call("Get", { typeName: "User" }),
                            api.call("Get", { typeName: "Trip", search: { fromDate: from, toDate: to } })
                        ]);

                        let fuelData = [];
                        try {
                            fuelData = await api.call("Get", { 
                                typeName: "StatusData", 
                                search: { fromDate: from, toDate: to, diagnosticSearch: { id: "DiagnosticFuelUsedId" } } 
                            });
                        } catch (e) { console.error("Error motor"); }

                        document.getElementById("debug").innerText = "Señales: " + fuelData.length;
                        this.render(devices, users, trips, fuelData);
                    } catch (e) { console.error(e); }
                    finally { document.getElementById("loader").style.display = "none"; }
                },

                render(devices, users, trips, fuel) {
                    const body = document.getElementById("resBody");
                    body.innerHTML = "";
                    const uMap = {};
                    users.forEach(u => { uMap[u.id] = (u.firstName + " " + u.lastName).trim() || u.name; });

                    const fMap = {};
                    fuel.forEach(f => {
                        const id = f.device.id;
                        const v = parseFloat(f.data);
                        if (!fMap[id]) fMap[id] = { s: v, e: v };
                        if (v < fMap[id].s) fMap[id].s = v;
                        if (v > fMap[id].e) fMap[id].e = v;
                    });

                    const stats = {};
                    trips.forEach(t => {
                        const vId = t.device.id;
                        const dName = (t.driver && uMap[t.driver.id]) ? uMap[t.driver.id] : "Desconocido";
                        if (t.distance > 0.1) {
                            if (!stats[vId]) stats[vId] = { d: 0, r: 0, fT: 0, drvs: {} };
                            if (!stats[vId].drvs[dName]) stats[vId].drvs[dName] = { d: 0, r: 0, fT: 0 };
                            
                            let secs = 0;
                            const dur = (t.idlingDuration || "0").toString();
                            if(dur.includes(":")) {
                                const p = dur.split(':');
                                secs = (+p[0]*3600 + +p[1]*60 + +p[2]);
                            } else { secs = parseFloat(dur) || 0; }

                            stats[vId].d += t.distance;
                            stats[vId].r += secs;
                            stats[vId].fT += (t.fuelUsed || 0);
                            stats[vId].drvs[dName].d += t.distance;
                            stats[vId].drvs[dName].r += secs;
                            stats[vId].drvs[dName].fT += (t.fuelUsed || 0);
                        }
                    });

                    devices.forEach(dev => {
                        const s = stats[dev.id];
                        if (!s) return;
                        let ltrs = (fMap[dev.id] ? (fMap[dev.id].e - fMap[dev.id].s) : 0) || s.fT || 0;
                        const gal = ltrs / 3.785;
                        const eff = gal > 0 ? (s.d / gal).toFixed(2) : "0.00";

                        body.innerHTML += `<tr style="background: #fdf2f2; font-weight: bold; border-left: 5px solid #c0392b;">
                            <td style="padding: 12px;">🚚 ${dev.name}</td>
                            <td style="text-align:center;">${s.d.toFixed(1)}</td>
                            <td style="text-align:center;">${gal.toFixed(1)}</td>
                            <td style="text-align:center;">${(s.r/3600).toFixed(1)}</td>
                            <td style="text-align:center;">${eff}</td>
                        </tr>`;

                        Object.keys(s.drvs).forEach(name => {
                            const d = s.drvs[name];
                            const dGal = s.d > 0 ? gal * (d.d / s.d) : 0;
                            body.innerHTML += `<tr style="color: #666; font-size: 13px;">
                                <td style="padding: 8px 8px 8px 45px;">👤 ${name}</td>
                                <td style="text-align:center;">${d.d.toFixed(1)}</td>
                                <td style="text-align:center;">${dGal.toFixed(1)}</td>
                                <td style="text-align:center;">${(d.r/3600).toFixed(1)}</td>
                                <td style="text-align:center;">--</td>
                            </tr>`;
                        });
                    });
                }
            };
        };
    </script>
</body>
</html>
